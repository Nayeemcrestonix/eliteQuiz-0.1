<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteQuiz | Premium Assessment Intelligence</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Third Party Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="root">
        <!-- Navigation Gateway -->
        <nav class="nav-glass" id="main-nav">
            <div class="container nav-content">
                <a href="#/" class="logo">
                    <i class="fas fa-microchip"></i>
                    <span>EliteQuiz</span>
                </a>
                <div id="auth-links" style="display: flex; gap: 2rem; align-items: center">
                    <!-- Dynamic Injected Links -->
                </div>
            </div>
        </nav>

        <!-- Dynamic Content Terminal -->
        <main id="view-terminal" style="padding-top: 100px">
            <!-- Application views will oscillate here -->
        </main>

        <!-- Global UI Elements -->
        <div id="global-spinner" class="hidden" style="position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(11, 15, 26, 0.8); z-index: 10000; backdrop-filter: blur(4px)">
            <div style="width: 60px; height: 60px; border: 4px solid var(--surface-border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite"></div>
        </div>
        
        <div id="toast-notifications" style="position: fixed; top: 2rem; right: 2rem; z-index: 10001; display: flex; flex-direction: column; gap: 1rem"></div>
        
        <!-- Theme Toggle Engine -->
        <div class="theme-fab shadow-premium" id="v2-theme-toggle" onclick="App.toggleTheme()">
            <i class="fas fa-moon"></i>
        </div>
    </div>

    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none !important; }
    </style>

    <script type="module" src="./main.js"></script>
</body>
</html>
