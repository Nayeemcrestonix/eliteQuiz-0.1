<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteQuiz | Test Your Skills Online</title>
    <!-- SEO Meta Tags -->
    <meta name="description" content="A premium online exam platform featuring dynamic multi-section tests.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Third Party Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dark-theme">
    <!-- Theme Toggle -->
    <button class="theme-toggle" id="theme-btn" onclick="App.toggleTheme()">
        <i class="fas fa-moon"></i>
    </button>

    <!-- Navigation Bar -->
    <nav class="glass-nav" id="main-nav">
        <div class="container nav-content">
            <div class="logo">
                <i class="fas fa-graduation-cap"></i>
                <span>EliteQuiz</span>
            </div>
            
            <!-- Desktop Menu -->
            <div class="nav-links" id="desktop-menu">
                <div id="auth-links" style="display: flex; gap: 2rem; align-items: center;">
                    <!-- Dynamic Auth Links -->
                </div>
            </div>

            <!-- Mobile Menu Toggle -->
            <button class="mobile-toggle" onclick="App.toggleMobileMenu()">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </nav>

    <!-- Main View Container -->
    <main id="app-root">
        <div id="view-container">
            <!-- Content will be injected here -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 EliteQuiz Platform. All rights reserved.</p>
        </div>
    </footer>

    <!-- Global Spinner -->
    <div id="loading-spinner" class="spinner-container hidden">
        <div class="spinner"></div>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container"></div>
    
    <!-- Heavy-duty Status Notifier (Bottom Right) -->
    <div id="status-notifier-container"></div>

    <!-- Core Scripts -->
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/views.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
